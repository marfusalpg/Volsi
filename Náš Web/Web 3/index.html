<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Volsi | Moderní weby od studentů</title>
        <link rel="stylesheet" href="style.css">
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap"
            rel="stylesheet">
        <link rel="icon" href="img/Web_icon.png" type="image/png">
        <script src="script.js"></script>
    </head>
    <body>

        <header class="navbar" role="banner">
            <div class="navbar__container">
                <a href="#" class="navbar__brand">Volsi<span class = "logo">.</span></a>

                <button class="navbar__toggle"
                    id="navbarToggle"
                    aria-label="Toggle navigation"
                    aria-controls="navbarMenu"
                    aria-expanded="false">
                    <span class="bar"></span>
                </button>

                <nav id="navbarMenu" class="navbar__menu" role="navigation"
                    aria-labelledby="navbarToggle">
                    <ul class="navbar__list">
                        <!-- Added a class for the active link demonstration on desktop -->
                        <li class="navbar__item"><a href="#"
                                class="navbar__link navbar__link--active">Home</a></li>
                        <li class="navbar__item"><a href="#"
                                class="navbar__link">Products</a></li>
                        <li class="navbar__item"><a href="#"
                                class="navbar__link">Showcase</a></li>
                        <li class="navbar__item navbar__item--cta">
                            <a href="#"
                                class="navbar__link navbar__link--cta">Login</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
        <div class="introduction-container">
            <section class="main-intro">
                <h1>Tvoříme weby, které <span class="purple-text">dávají smysl.</span> </h1>
            </section>

        </div>
    </body>
</html>
