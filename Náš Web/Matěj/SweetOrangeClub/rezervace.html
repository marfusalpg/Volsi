<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervace a Rozvrh | Sweet Orange Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar"><div class="container"><div class="logo"><a href="index.html" style="text-decoration:none;color:inherit;"><span>Sweet Orange Club</span></a></div></div></header>

    <main class="container" style="margin-top: 120px;">
        <h1 class="section-title">Rozvrh lekcí</h1>
        <table style="width:100%; border-collapse: collapse; margin-bottom: 50px;">
            <tr style="background: var(--navy); color: white;">
                <th style="padding:15px; border: 1px solid #ddd;">Čas</th>
                <th style="padding:15px; border: 1px solid #ddd;">Pondělí</th>
                <th style="padding:15px; border: 1px solid #ddd;">Středa</th>
                <th style="padding:15px; border: 1px solid #ddd;">Pátek</th>
            </tr>
            <tr>
                <td style="padding:15px; border: 1px solid #ddd; font-weight:bold;">17:00</td>
                <td style="padding:15px; border: 1px solid #ddd; color:var(--orange);">Spinning</td>
                <td style="padding:15px; border: 1px solid #ddd; color:var(--orange);">TRX</td>
                <td style="padding:15px; border: 1px solid #ddd; color:var(--orange);">Spinning</td>
            </tr>
            <tr style="background:#f9f9f9;">
                <td style="padding:15px; border: 1px solid #ddd; font-weight:bold;">18:00</td>
                <td style="padding:15px; border: 1px solid #ddd; color:var(--orange);">Kruháč</td>
                <td style="padding:15px; border: 1px solid #ddd; color:var(--orange);">Spinning</td>
                <td style="padding:15px; border: 1px solid #ddd; color:var(--orange);">Břišní pekáč</td>
            </tr>
        </table>

        <h2 id="cenik" class="section-title">Ceník služeb</h2>
        <div style="background: var(--light-grey); padding: 30px; border-radius: 10px;">
            <p><strong>Jednotlivý vstup:</strong> 180 Kč</p>
            <p><strong>Permanentka (10 vstupů):</strong> 1 600 Kč</p>
            <p><strong>Power Plate (30 min):</strong> 250 Kč</p>
            <br>
            <p>Pro rezervaci volejte na: <strong>+420 XXX XXX XXX</strong></p>
        </div>
    </main>
</body>
</html>
